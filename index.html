.job-vacancy {
  display: inline-block;
  margin-top: 6px;
  padding: 4px 8px;
  background: #fff0f2;
  color: #a80725;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
}

.apply-link {
  display: block;
  margin-top: 7px;
  color: #d90429;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
}
<script>
  const API_URL =
    "https://script.google.com/macros/s/AKfycby-emiO4iyZ6V-o7N3Pn9T7f385SiXPSm5lcWAa-LHKIODPhVnxPXvoRY278JfhwIMIBg/exec";

  const LIMIT = 5;
  const listElement = document.getElementById("lastDateList");

  function escapeHTML(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function safeURL(value) {
    try {
      const url = new URL(String(value || "").trim());

      if (url.protocol === "https:" || url.protocol === "http:") {
        return url.href;
      }
    } catch (error) {}

    return "";
  }

  function parseDate(value) {
    const date = new Date(String(value) + "T12:00:00");

    return isNaN(date.getTime()) ? null : date;
  }

  function getDateParts(value) {
    const date = parseDate(value);

    if (!date) {
      return null;
    }

    return {
      day: String(date.getDate()).padStart(2, "0"),
      month: date
        .toLocaleDateString("en-IN", { month: "short" })
        .toUpperCase()
    };
  }

  function getDaysLeft(value) {
    const closingDate = parseDate(value);

    if (!closingDate) {
      return null;
    }

    const today = new Date();

    today.setHours(0, 0, 0, 0);
    closingDate.setHours(0, 0, 0, 0);

    return Math.round(
      (closingDate.getTime() - today.getTime()) /
      (1000 * 60 * 60 * 24)
    );
  }

  function getStatus(value) {
    const daysLeft = getDaysLeft(value);

    if (daysLeft === 0) {
      return "Today is Last Date to Apply";
    }

    if (daysLeft >= 1 && daysLeft <= 3) {
      return "Closing Soon";
    }

    return "Apply Now";
  }

  function formatVacancies(value) {
    const text = String(value || "").trim();

    if (!text) {
      return "";
    }

    const number = Number(text.replace(/,/g, ""));

    if (!Number.isNaN(number)) {
      return number.toLocaleString("en-IN") + " Vacancies";
    }

    return text + " Vacancies";
  }

  function createCard(job) {
    const title = String(job.targetName || "").trim();
    const lastDate = String(job.lastDate || "").trim();
    const notificationPdf = safeURL(job.notificationPdf);
    const applicationLink = safeURL(job.applicationLink);
    const vacancies = formatVacancies(job.vacancies);

    const dateParts = getDateParts(lastDate);

    if (!title || !dateParts) {
      return "";
    }

    const titleHTML = notificationPdf
      ? `
        <a
          class="job-title"
          href="${escapeHTML(notificationPdf)}"
          target="_blank"
          rel="noopener noreferrer"
        >
          ${escapeHTML(title)}
        </a>
      `
      : `
        <div class="job-title">
          ${escapeHTML(title)}
        </div>
      `;

    const vacancyHTML = vacancies
      ? `
        <div class="job-vacancy">
          👥 ${escapeHTML(vacancies)}
        </div>
      `
      : "";

    const status = getStatus(lastDate);

    const statusHTML = applicationLink
      ? `
        <a
          class="apply-link"
          href="${escapeHTML(applicationLink)}"
          target="_blank"
          rel="noopener noreferrer"
        >
          ${escapeHTML(status)}
        </a>
      `
      : `
        <div class="job-status">
          ${escapeHTML(status)}
        </div>
      `;

    return `
      <div class="job-card">
        <div class="date-box">
          <div class="date-day">
            ${escapeHTML(dateParts.day)}
          </div>

          <div class="date-month">
            ${escapeHTML(dateParts.month)}
          </div>
        </div>

        <div class="job-content">
          ${titleHTML}
          ${vacancyHTML}
          ${statusHTML}
        </div>
      </div>
    `;
  }

  async function loadJobs() {
    try {
      const requestURL =
        API_URL +
        "?limit=" +
        encodeURIComponent(LIMIT) +
        "&cache=" +
        Date.now();

      console.log("Fetching:", requestURL);

      const response = await fetch(requestURL);

      if (!response.ok) {
        throw new Error("HTTP error: " + response.status);
      }

      const text = await response.text();

      console.log("API response:", text);

      const result = JSON.parse(text);

      if (result.status !== "success") {
        throw new Error(
          result.message || "Apps Script returned an error"
        );
      }

      const jobs = Array.isArray(result.jobs)
        ? result.jobs
        : [];

      if (!jobs.length) {
        listElement.innerHTML =
          '<div class="empty-message">No upcoming deadlines found.</div>';

        return;
      }

      const cards = jobs
        .map(createCard)
        .filter(Boolean)
        .join("");

      listElement.innerHTML =
        cards ||
        '<div class="empty-message">No valid deadlines found.</div>';

    } catch (error) {
      console.error("Widget error:", error);

      listElement.innerHTML =
        '<div class="error-message">' +
        "Unable to load: " +
        escapeHTML(error.message) +
        "</div>";
    }
  }

  loadJobs();
</script>
